<script>
  window.addEventListener('DOMContentLoaded', () => {
    const cards = Array.from(document.querySelectorAll('.dataset-grid .dataset-card-link'));
    const pagination = document.getElementById('dataset-pagination');
    const prevBtn = document.getElementById('dataset-page-prev');
    const nextBtn = document.getElementById('dataset-page-next');
    const pageInfo = document.getElementById('dataset-page-info');

    if (!cards.length || !pagination || !prevBtn || !nextBtn || !pageInfo) return;

    const pageSize = 12;
    let currentPage = 1;

    const getBaseVisibleCards = () => cards.filter((card) => card.style.display !== 'none');

    const applyPagination = (resetToFirstPage = false) => {
      cards.forEach((card) => {
        card.dataset.paginationHidden = 'false';
      });

      const visibleCards = getBaseVisibleCards();
      const totalPages = Math.max(1, Math.ceil(visibleCards.length / pageSize));

      if (resetToFirstPage) {
        currentPage = 1;
      } else if (currentPage > totalPages) {
        currentPage = totalPages;
      }

      const start = (currentPage - 1) * pageSize;
      const end = start + pageSize;

      visibleCards.forEach((card, index) => {
        const inPage = index >= start && index < end;
        card.dataset.paginationHidden = inPage ? 'false' : 'true';
      });

      const shouldShowPagination = visibleCards.length > pageSize;
      pagination.hidden = !shouldShowPagination;
      pageInfo.textContent = `Page ${currentPage} of ${totalPages}`;
      prevBtn.disabled = currentPage <= 1;
      nextBtn.disabled = currentPage >= totalPages;

      const resultsCounter = document.getElementById('dataset-results-count');
      if (resultsCounter) {
        const matchingCount = Number(resultsCounter.dataset.matchingCount || visibleCards.length || 0);
        const totalCount = Number(resultsCounter.dataset.totalCount || cards.length || 0);
        const activeFiltersCount = Number(resultsCounter.dataset.activeFiltersCount || 0);
        const searchActive = resultsCounter.dataset.searchActive === 'true';

        const startDisplay = matchingCount === 0 ? 0 : start + 1;
        const endDisplay = matchingCount === 0 ? 0 : Math.min(end, matchingCount);

        const rangeText = matchingCount > pageSize
          ? `Showing ${startDisplay}–${endDisplay} of ${matchingCount} matching datasets`
          : `Showing ${matchingCount} of ${totalCount} datasets`;

        const filterText = activeFiltersCount > 0
          ? ` • ${activeFiltersCount} active filter${activeFiltersCount > 1 ? 's' : ''}`
          : '';

        const queryText = searchActive ? ' • search active' : '';

        resultsCounter.textContent = `${rangeText}${filterText}${queryText}`;
      }
    };

    prevBtn.addEventListener('click', () => {
      if (currentPage <= 1) return;
      currentPage -= 1;
      applyPagination();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    nextBtn.addEventListener('click', () => {
      currentPage += 1;
      applyPagination();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    document.addEventListener('input', () => {
      applyPagination(true);
    });

    document.addEventListener('change', () => {
      applyPagination(true);
    });

    const observer = new MutationObserver((mutations) => {
      const relevant = mutations.some((m) => m.type === 'attributes' && m.attributeName === 'style' && m.target.classList && m.target.classList.contains('dataset-card-link'));
      if (relevant) {
        applyPagination(true);
      }
    });

    cards.forEach((card) => observer.observe(card, { attributes: true, attributeFilter: ['style'] }));

    applyPagination(true);
  });
</script>

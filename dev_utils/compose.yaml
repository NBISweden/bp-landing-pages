---

services:
  minio:
    command: server /data --console-address ":9001"
    container_name: s3
    volumes:
      - /mnt/data:/data
    environment:
      - MINIO_ROOT_USER=myaccesskey
      - MINIO_ROOT_PASSWORD=mysecretkey
    healthcheck:
      test: ["CMD", "curl", "-fkq", "https://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 20s
      retries: 3
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
